name: Daily Competitor New Products Crawl

on:
  schedule:
    # 매일 00:00 UTC = 09:00 JST 1회
    - cron: '0 0 * * *'
  workflow_dispatch:   # 수동 실행 허용

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Qoo10 rank crawler (Best 200)
        run: |
          python crawler/qoo10_rank.py || echo "qoo10 rank failed — proceed"

      - name: Run LIPS rank crawler (19 카테고리 Top 100)
        run: |
          python crawler/lips_rank.py || echo "lips rank failed — proceed"

      - name: Run main crawler (new products + Qoo10/LIPS/cosme 결합)
        run: |
          python crawler/qoo10_new_products.py

      - name: Run direction analyzer
        run: |
          python crawler/product_direction.py

      - name: Copy data into dashboard/
        run: |
          mkdir -p dashboard/data
          cp data/new_products.json dashboard/data/new_products.json
          cp data/_direction.json dashboard/data/_direction.json
          [ -f data/rank_beauty.json ] && cp data/rank_beauty.json dashboard/data/rank_beauty.json || true
          [ -f data/lips_rank.json ] && cp data/lips_rank.json dashboard/data/lips_rank.json || true

      - name: Commit + push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard/data/
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "chore(crawl): daily snapshot ${DATE}"
          git push
